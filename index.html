<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 App Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 16px;
        }
        
        #app-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .app-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }
        .app-icon {
            width: 48px; 
            height: 48px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border-radius: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 24px;
            flex-shrink: 0;
        }
        .app-name { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .download-btn {
            background-color: var(--accent); 
            color: #0f172a;
            text-decoration: none; 
            padding: 10px 18px; 
            border-radius: 10px; 
            font-weight: 700;
            font-size: 14px; 
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .download-btn:hover { background-color: var(--accent-hover); }
    </style>
</head>
<body>

    <main id="app-grid">

        <!-- APP ROW: 3D Plane Group -->
        <div class="app-card">
            <div class="app-info">
                <div class="app-icon">✈️</div>
                <div class="app-name">3D Plane Group</div>
            </div>
            <a href="./apps/3D_Plane_Group.apk" download="3D_Plane_Group.apk" class="download-btn">Install</a>
        </div>

    </main>

</body>
</html>
