<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 App Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 16px;
        }
        
        /* Mobile-first stack */
        #app-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Native-style list row layout */
        .app-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }
        .app-icon {
            width: 48px; 
            height: 48px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border-radius: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 24px;
            flex-shrink: 0;
        }
        .app-name { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .download-btn {
            background-color: var(--accent); 
            color: #0f172a;
            text-decoration: none; 
            padding: 10px 18px; 
            border-radius: 10px; 
            font-weight: 700;
            font-size: 14px; 
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .download-btn:hover { background-color: var(--accent-hover); }
        .loading { text-align: center; color: var(--text-muted); font-size: 16px; padding: 40px; }
    </style>
</head>
<body>

    <main id="app-grid">
        <div class="loading">Scanning directory for updates...</div>
    </main>

    <script>
        const USER = "25kurellan"; 
        const REPO = "3D-Plane-Group";

        async function fetchApps() {
            const grid = document.getElementById('app-grid');
            try {
                const response = await fetch(`https://github.com{USER}/${REPO}/contents/apps`);
                if (!response.ok) throw new Error("Directory not found");
                
                const files = await response.json();
                grid.innerHTML = "";
                
                const apkFiles = files.filter(file => file.name.toLowerCase().endsWith('.apk'));
                
                if (apkFiles.length === 0) {
                    grid.innerHTML = `<div class="loading">No applications available for download.</div>`;
                    return;
                }

                apkFiles.forEach(file => {
                    const readableName = file.name.replace(/\.apk$/i, '').replace(/[_-]/g, ' ');
                    const downloadUrl = `https://${USER}.github.io/${REPO}/apps/${file.name}`;

                    const card = document.createElement('div');
                    card.className = 'app-card';
                    card.innerHTML = `
                        <div class="app-info">
                            <div class="app-icon">✈️</div>
                            <div class="app-name">${readableName}</div>
                        </div>
                        <a href="${downloadUrl}" class="download-btn">Install</a>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                grid.innerHTML = `<div class="loading" style="color: #ef4444;">Connection failed: ${error.message}</div>`;
            }
        }

        fetchApps();
    </script>
</body>
</html>
